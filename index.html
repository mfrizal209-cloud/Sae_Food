<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Sae Food — Cita Rasa & Suasana Hati</title>

  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1c;
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .glass-modern {
      background: rgba(15, 30, 55, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(59, 130, 246, 0.4);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.35);
    }
    .glass-card {
      background: rgba(25, 45, 75, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(59, 130, 246, 0.35);
      transition: all 0.2s ease;
    }
    .glass-card:hover {
      background: rgba(59, 130, 246, 0.25);
      transform: translateY(-3px);
      border-color: rgba(59, 130, 246, 0.7);
    }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: #1e2a3a; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    .animate-fade-in { animation: fadeSlide 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
    @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    #map { 
      width: 100%; 
      height: 36vh; 
      z-index: 1; 
      border-radius: 28px; 
      overflow: hidden; 
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
    }
    @media (min-width: 768px) { #map { height: 42vh; } }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    
    /* Scroll area utama yang smooth tanpa penghalang */
    .main-scroll-area { 
      flex: 1; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column;
      scroll-behavior: smooth;
    }
    
    /* Flash Card Grid yang rapi dan scrollable */
    .flash-grid-modern {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px;
      padding: 8px 2px 20px 2px;
    }
    .flash-food-item {
      background: linear-gradient(145deg, rgba(20, 40, 70, 0.9), rgba(12, 25, 45, 0.95));
      backdrop-filter: blur(8px);
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
      border: 1px solid rgba(59,130,246,0.3);
    }
    .flash-food-item:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
      box-shadow: 0 12px 25px -8px rgba(59,130,246,0.4);
    }
    .flash-img {
      width: 100%;
      height: 125px;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .flash-food-item:hover .flash-img {
      transform: scale(1.03);
    }
    .badge-kategori {
      background: rgba(59,130,246,0.3);
      border-radius: 40px;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .btn-primary-glow {
      transition: all 0.2s;
    }
    .btn-primary-glow:active { transform: scale(0.97); }
    
    /* Loading overlay */
    .logout-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 20000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: white;
      font-weight: 500;
    }
    
    /* Hilangkan semua border yang mengganggu di konten dinamis */
    #dynamicContentArea {
      scrollbar-width: thin;
    }
    .no-barrier {
      border: none !important;
    }
  </style>
</head>
<body class="bg-[#0a0f1c]">

  <div id="toastMsg" class="fixed top-5 right-4 z-[10050] bg-white/10 backdrop-blur-md border border-blue-400/60 text-white px-5 py-3 rounded-2xl text-sm font-medium shadow-xl transition-all duration-300 translate-x-[120%] opacity-0 pointer-events-none"></div>

  <!-- AUTH SECTION -->
  <div id="authWrapper" class="min-h-screen flex items-center justify-center p-5 relative">
    <div class="absolute top-0 left-0 w-72 h-72 bg-blue-600/20 rounded-full blur-[70px] -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-80 h-80 bg-cyan-500/20 rounded-full blur-[80px] translate-x-1/3 translate-y-1/3"></div>
    <div class="relative z-10 w-full max-w-md glass-modern rounded-3xl p-6 md:p-8 shadow-2xl animate-fade-in">
      <div class="flex flex-col items-center mb-6">
        <div class="bg-blue-500/20 p-3 rounded-full mb-2"><i class="fas fa-utensils text-4xl text-blue-300"></i></div>
        <h1 class="text-white text-3xl font-extrabold tracking-tight">Sae Food</h1>
        <p class="text-blue-200 text-sm">Rasa & suasana hati menyatu</p>
      </div>
      <div id="loginBox">
        <div class="text-white text-2xl font-bold text-center mb-5">Masuk</div>
        <div class="space-y-4">
          <div><label class="text-blue-200 text-sm font-medium">Nomor HP</label><input type="tel" id="loginHp" placeholder="08xxxxxxxxxx" class="w-full bg-white/10 border border-blue-500/40 rounded-xl px-4 py-3 text-white"></div>
          <div><label class="text-blue-200 text-sm font-medium">Password</label><input type="password" id="loginPassword" placeholder="Kata sandi" class="w-full bg-white/10 border border-blue-500/40 rounded-xl px-4 py-3 text-white"></div>
          <button onclick="prosesLogin()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-bold py-3 rounded-xl mt-3 shadow-lg transition hover:shadow-blue-500/30">Login</button>
          <div id="loadingLogin" class="text-center text-blue-300 text-sm hidden"><i class="fas fa-spinner fa-spin"></i> Memproses...</div>
          <p class="text-center text-blue-200 text-sm mt-4">Belum punya akun? <span onclick="toggleToRegister()" class="text-white font-bold underline cursor-pointer">Daftar Sekarang</span></p>
        </div>
      </div>
      <div id="registerBox" class="hidden">
        <div class="text-white text-2xl font-bold text-center mb-5">Daftar Akun</div>
        <div class="space-y-4">
          <div><label class="text-blue-200 text-sm font-medium">Nama Lengkap</label><input type="text" id="regNama" placeholder="Nama kamu" class="w-full bg-white/10 border border-blue-500/40 rounded-xl px-4 py-3 text-white"></div>
          <div><label class="text-blue-200 text-sm font-medium">Nomor HP</label><input type="tel" id="regHp" placeholder="08xxxxxxxxxx" class="w-full bg-white/10 border border-blue-500/40 rounded-xl px-4 py-3 text-white"></div>
          <div><label class="text-blue-200 text-sm font-medium">Password</label><input type="password" id="regPassword" placeholder="Buat password" class="w-full bg-white/10 border border-blue-500/40 rounded-xl px-4 py-3 text-white"></div>
          <button onclick="prosesRegister()" class="w-full bg-blue-700 hover:bg-blue-600 text-white font-bold py-3 rounded-xl mt-2">Daftar</button>
          <div id="loadingRegister" class="text-center text-blue-300 text-sm hidden"><i class="fas fa-spinner fa-spin"></i> Mendaftar...</div>
          <p class="text-center text-blue-200 text-sm mt-4">Sudah punya akun? <span onclick="toggleToLogin()" class="text-white font-bold underline cursor-pointer">Login</span></p>
        </div>
      </div>
    </div>
  </div>

  <!-- HOME + MAPS dengan tata letak sangat responsif & scroll smooth -->
  <div id="appHome" class="hidden flex flex-col h-screen">
    <!-- Header welcome + logout -->
    <div class="glass-modern mx-3 mt-3 rounded-2xl p-3 flex justify-between items-center z-20 shadow-md">
      <div>
        <h2 class="text-white font-bold text-lg flex items-center gap-2"><i class="fas fa-map-marked-alt text-blue-400"></i> Sae Food AI</h2>
        <p id="welcomeUserText" class="text-blue-200 text-xs">Selamat datang, Penggemar Kuliner</p>
      </div>
      <button id="logoutButton" class="bg-red-500/80 hover:bg-red-600 text-white px-3 py-1.5 rounded-xl text-xs font-semibold flex gap-1 items-center transition"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    </div>

    <!-- Search, filter, dan AI Mood ditempatkan rapi -->
    <div class="glass-modern mx-3 mt-2 rounded-2xl p-3 shadow-md z-10">
      <div class="relative mb-2">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-blue-300 text-sm"></i>
        <input type="text" id="searchFoodInput" placeholder="Cari makanan favorit..." class="w-full bg-white/10 border border-blue-400/40 rounded-xl py-2.5 pl-9 pr-3 text-white placeholder:text-blue-200/60 text-sm focus:ring-1 focus:ring-blue-400">
      </div>
      <div class="flex gap-2">
        <select id="categoryFilterSelect" class="flex-1 bg-white/10 border border-blue-400/40 rounded-xl px-3 py-2 text-white text-sm">
          <option value="">📋 Semua Kategori</option>
          <option value="Bakso">🍲 Bakso</option><option value="Mie">🍜 Mie</option><option value="Ayam">🍗 Ayam</option><option value="Minuman">🥤 Minuman</option>
        </select>
        <button id="aiMoodBtn" class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white px-4 rounded-xl font-bold flex gap-1 items-center shadow-md text-sm"><i class="fas fa-robot text-xs"></i> AI Mood</button>
      </div>
    </div>

    <!-- Peta Leaflet dengan border halus -->
    <div class="mx-3 mt-2">
      <div id="map" class="rounded-2xl overflow-hidden shadow-xl border border-blue-500/20"></div>
    </div>

    <!-- Panel scrollable utama: rekomendasi & flash cards (tanpa garis penghalang berlebih) -->
    <div class="main-scroll-area mt-2 mx-3 mb-3">
      <div class="glass-modern rounded-2xl flex flex-col h-full overflow-hidden">
        <!-- Tombol Tampilkan Semua Menu -->
        <div class="px-3 pt-3 pb-1">
          <button id="showAllFlashBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition shadow-md btn-primary-glow">
            <i class="fas fa-th-large"></i> Tampilkan Semua Menu
          </button>
        </div>

        <!-- AREA KONTEN DINAMIS: scroll mulus tanpa barrier -->
        <div id="dynamicContentArea" class="px-3 pb-4 pt-1 flex-1 overflow-y-auto custom-scroll">
          <!-- Default: 3 rekomendasi terdekat -->
          <div id="nearbySection">
            <div class="flex justify-between items-center mb-2 mt-1">
              <h3 class="text-white font-semibold flex gap-2 text-sm"><i class="fas fa-location-dot text-cyan-400"></i> 3 Rekomendasi Terdekat</h3>
              <span id="foodCountBadge" class="bg-blue-800/60 text-blue-200 text-xs px-2 py-0.5 rounded-full">0 makanan</span>
            </div>
            <div id="top3Container" class="space-y-2"></div>
          </div>
          <div id="flashCardSection" class="hidden">
            <div class="flex justify-between items-center mb-2 mt-1">
              <h3 class="text-white font-semibold flex gap-2 text-sm"><i class="fas fa-archive text-blue-300"></i> Semua Menu Kuliner</h3>
              <button id="closeFlashViewBtn" class="text-blue-300 text-xs bg-blue-900/50 px-2 py-1 rounded-full hover:bg-blue-800 transition"><i class="fas fa-arrow-left"></i> Kembali</button>
            </div>
            <div id="flashCardGrid" class="flash-grid-modern">
              <!-- Flash card akan diisi JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL DETAIL MAKANAN -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/80 z-[10060] flex items-end md:items-center justify-center transition-all duration-300">
    <div class="glass-modern rounded-t-3xl md:rounded-3xl w-full md:w-[500px] max-h-[85vh] overflow-y-auto custom-scroll p-5 animate-fade-in">
      <div class="flex justify-between items-center border-b border-blue-500/30 pb-2">
        <h2 class="text-white font-bold text-xl flex gap-2"><i class="fas fa-utensils text-blue-400"></i> Detail Rasa</h2>
        <button onclick="closeDetailModal()" class="text-white text-2xl bg-white/10 w-8 h-8 rounded-full">×</button>
      </div>
      <div id="modalDetailBody" class="mt-3"></div>
    </div>
  </div>

  <!-- MODAL AI MOOD -->
  <div id="aiMoodModal" class="hidden fixed inset-0 bg-black/80 z-[10070] flex items-center justify-center p-4">
    <div class="glass-modern rounded-3xl p-6 w-full max-w-md text-center animate-fade-in">
      <i class="fas fa-brain text-cyan-400 text-4xl mb-2"></i>
      <h3 class="text-white text-2xl font-bold mb-3">Bagaimana perasaanmu?</h3>
      <div class="grid grid-cols-2 gap-4 mt-2">
        <button onclick="pilihMood('sedih')" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl text-white font-semibold"><i class="fas fa-sad-tear mr-1"></i> Sedih</button>
        <button onclick="pilihMood('bahagia')" class="bg-cyan-600 hover:bg-cyan-500 p-3 rounded-xl text-white"><i class="fas fa-smile-wink mr-1"></i> Bahagia</button>
        <button onclick="pilihMood('nostalgia')" class="bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl text-white"><i class="fas fa-clock mr-1"></i> Nostalgia</button>
        <button onclick="pilihMood('biasa')" class="bg-slate-600 hover:bg-slate-500 p-3 rounded-xl text-white"><i class="fas fa-meh mr-1"></i> Biasa</button>
      </div>
      <button onclick="closeAiMoodModal()" class="mt-5 w-full bg-white/10 hover:bg-white/20 text-white p-2.5 rounded-xl">Tutup</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznNjV9UNUoK3FP_-pZg1GcSwddGSQvllmANlTtHQzU1tfe-Y9vlN3gjFQeqnhJeUb0/exec";
    const SHEET_FOOD_URL = "https://opensheet.elk.sh/1bV4d9W1Wv5FibcVIY8-3tqHSqCXr71R1-v-ojkcnpXA/Sheet1";
    
    let masterFoods = [];
    let currentUser = { nama: "" };
    let map, userMarker, allMarkers = [];
    let currentLat = -7.353, currentLng = 112.718;
    let isFlashMode = false;
    let isMapInitialized = false;

    function showToast(msg, isError = false) {
      const toast = document.getElementById("toastMsg");
      toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${msg}`;
      toast.classList.remove("translate-x-[120%]", "opacity-0");
      toast.classList.add("translate-x-0", "opacity-100");
      setTimeout(() => toast.classList.add("translate-x-[120%]", "opacity-0"), 2800);
    }

    function logout() {
      const loadingOverlay = document.createElement('div');
      loadingOverlay.className = 'logout-loading';
      loadingOverlay.innerHTML = '<i class="fas fa-spinner fa-spin text-3xl text-blue-400"></i><p>Keluar dari akun...</p>';
      document.body.appendChild(loadingOverlay);
      
      setTimeout(() => {
        localStorage.removeItem("sae_user_nama");
        localStorage.clear();
        currentUser.nama = "";
        masterFoods = [];
        isFlashMode = false;
        
        if (map) {
          map.remove();
          map = null;
          userMarker = null;
          allMarkers = [];
          isMapInitialized = false;
        }
        
        document.getElementById("appHome").classList.add("hidden");
        const authWrapper = document.getElementById("authWrapper");
        authWrapper.classList.remove("hidden");
        
        document.getElementById("loginHp").value = "";
        document.getElementById("loginPassword").value = "";
        document.getElementById("regNama").value = "";
        document.getElementById("regHp").value = "";
        document.getElementById("regPassword").value = "";
        
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("registerBox").classList.add("hidden");
        
        loadingOverlay.remove();
        showToast("Anda telah keluar dari akun", false);
      }, 300);
    }

    async function prosesLogin() {
      const hp = document.getElementById("loginHp").value.trim();
      const pwd = document.getElementById("loginPassword").value.trim();
      if (!hp || !pwd) return showToast("HP & password wajib diisi", true);
      const loadingDiv = document.getElementById("loadingLogin");
      loadingDiv.classList.remove("hidden");
      try {
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "login", nomorhp: hp, password: pwd }) });
        const data = await res.json();
        loadingDiv.classList.add("hidden");
        if (data.status === "success") {
          localStorage.setItem("sae_user_nama", data.nama);
          showToast(``);
          currentUser.nama = data.nama;
          pindahKeHome(data.nama);
        } else showToast(data.message || "Login gagal", true);
      } catch(e) { loadingDiv.classList.add("hidden"); showToast("Koneksi error", true); }
    }

    async function prosesRegister() {
      const nama = document.getElementById("regNama").value.trim();
      const hp = document.getElementById("regHp").value.trim();
      const pwd = document.getElementById("regPassword").value.trim();
      if (!nama || !hp || !pwd) return showToast("Lengkapi semua data!", true);
      const loadingReg = document.getElementById("loadingRegister");
      loadingReg.classList.remove("hidden");
      try {
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "register", nama, nomorhp: hp, password: pwd }) });
        const data = await res.json();
        loadingReg.classList.add("hidden");
        showToast(data.message);
        if (data.status === "success") {
          document.getElementById("regNama").value = ""; document.getElementById("regHp").value = ""; document.getElementById("regPassword").value = "";
          toggleToLogin();
        }
      } catch(e) { loadingReg.classList.add("hidden"); showToast("Gagal daftar", true); }
    }

    function toggleToRegister() { document.getElementById("loginBox").classList.add("hidden"); document.getElementById("registerBox").classList.remove("hidden"); }
    function toggleToLogin() { document.getElementById("registerBox").classList.add("hidden"); document.getElementById("loginBox").classList.remove("hidden"); }

    function pindahKeHome(namaUser) {
      document.getElementById("authWrapper").classList.add("hidden");
      document.getElementById("appHome").classList.remove("hidden");
      document.getElementById("welcomeUserText").innerHTML = `Halo, <b>${namaUser}</b> • Tempat favoritmu 🔥`;
      initMapAndFood();
    }

    function initMapAndFood() {
      if (isMapInitialized && map) return;
      if (map) { map.remove(); map = null; }
      map = L.map("map").setView([currentLat, currentLng], 14);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", { attribution: '&copy; OSM & CartoDB', subdomains: 'abcd', maxZoom: 19 }).addTo(map);
      isMapInitialized = true;
      getLocationAndUpdate();
      loadFoodDataFromSheet();
    }

    function getLocationAndUpdate() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => { currentLat = pos.coords.latitude; currentLng = pos.coords.longitude; map.setView([currentLat, currentLng], 15); updateUserMarker(); renderUIByMode(); },
          () => { showToast("Lokasi tidak diizinkan, pakai default", true); updateUserMarker(); renderUIByMode(); }
        );
      } else { updateUserMarker(); renderUIByMode(); }
    }

    function updateUserMarker() {
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([currentLat, currentLng], { icon: L.divIcon({ className: 'custom-user-marker', html: '<i class="fas fa-circle-user text-blue-400 text-3xl drop-shadow"></i>', iconSize: [32, 32] }) }).addTo(map).bindPopup("<b>📍 Posisi Kamu</b>").openPopup();
    }

    function distance(lat1, lon1, lat2, lon2) {
      const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function loadFoodDataFromSheet() {
      try {
        const res = await fetch(SHEET_FOOD_URL);
        masterFoods = await res.json();
        renderUIByMode();
      } catch(e) { showToast("Gagal muat data kuliner", true); }
    }

    function getFilteredFoods() {
      if (!masterFoods.length) return [];
      const keyword = document.getElementById("searchFoodInput")?.value.toLowerCase() || "";
      const category = document.getElementById("categoryFilterSelect")?.value || "";
      let filtered = masterFoods.filter(f => {
        const nama = (f["Nama Makanan"] || "").toLowerCase();
        const kat = f["Kategori"] || "";
        return nama.includes(keyword) && (!category || kat === category);
      });
      filtered.forEach(f => {
        const lat = parseFloat(f.latitude), lng = parseFloat(f.longitude);
        f.distance = (!isNaN(lat) && !isNaN(lng)) ? distance(currentLat, currentLng, lat, lng) : 9999;
      });
      filtered.sort((a,b) => a.distance - b.distance);
      return filtered;
    }

    function renderUIByMode() {
      if (!masterFoods.length || !map) return;
      const filtered = getFilteredFoods();
      document.getElementById("foodCountBadge").innerHTML = `${filtered.length} item`;
      
      allMarkers.forEach(m => map.removeLayer(m));
      allMarkers = [];
      filtered.forEach(food => {
        const lat = parseFloat(food.latitude), lng = parseFloat(food.longitude);
        if (!isNaN(lat) && !isNaN(lng)) {
          const marker = L.marker([lat, lng]).addTo(map);
          marker.bindPopup(`<b>${food["Nama Makanan"]}</b><br>${food.distance.toFixed(1)} km`);
          marker.on("click", () => tampilkanDetail(food));
          allMarkers.push(marker);
        }
      });

      if (isFlashMode) {
        document.getElementById("nearbySection").classList.add("hidden");
        document.getElementById("flashCardSection").classList.remove("hidden");
        renderFlashCards(filtered);
      } else {
        document.getElementById("nearbySection").classList.remove("hidden");
        document.getElementById("flashCardSection").classList.add("hidden");
        renderTop3Recommendations(filtered);
      }
    }

    function renderTop3Recommendations(filtered) {
      const container = document.getElementById("top3Container");
      const top3 = filtered.slice(0,3);
      if (top3.length === 0) {
        container.innerHTML = `<div class="text-blue-200 text-center p-4 bg-white/5 rounded-xl text-sm">🍽️ Tidak ada makanan sesuai filter</div>`;
        return;
      }
      container.innerHTML = "";
      top3.forEach(food => {
        const distKm = food.distance.toFixed(1);
        container.innerHTML += `
          <div onclick='tampilkanDetail(${JSON.stringify(food).replace(/'/g, "&#39;")})' class="glass-card rounded-xl p-2.5 cursor-pointer border border-blue-400/30 transition hover:bg-blue-800/30">
            <div class="flex gap-2.5">
              <img src="${food["Link Gambar"] || 'https://placehold.co/80x80?text=Food'}" class="w-16 h-16 rounded-xl object-cover shadow" onerror="this.src='https://placehold.co/80x80?text=Yummy'">
              <div class="flex-1">
                <div class="flex justify-between items-start"><h4 class="text-white font-bold text-sm">${food["Nama Makanan"]}</h4><span class="text-cyan-300 text-[10px] bg-blue-900/50 px-1.5 rounded-full whitespace-nowrap ml-1"><i class="fas fa-map-pin"></i> ${distKm} km</span></div>
                <p class="text-gray-300 text-xs line-clamp-2 mt-0.5">${food["Deskripsi Makanan"] || "Lezat dan menggoda"}</p>
                <div class="flex justify-between items-center mt-1"><span class="text-blue-300 font-semibold text-xs">Rp${food.Harga || "-"}</span><button class="bg-blue-600 text-white px-2 py-0.5 rounded-lg text-[10px]">Detail</button></div>
              </div>
            </div>
          </div>
        `;
      });
    }

    function renderFlashCards(filteredArray) {
      const grid = document.getElementById("flashCardGrid");
      if (!filteredArray.length) {
        grid.innerHTML = `<div class="col-span-full text-center text-blue-200 py-10 bg-white/5 rounded-2xl">✨ Tidak ada makanan dengan filter ini</div>`;
        return;
      }
      let html = "";
      filteredArray.forEach(f => {
        const imgSrc = f["Link Gambar"] || "https://placehold.co/300x200?text=Kuliner";
        html += `
          <div onclick='tampilkanDetail(${JSON.stringify(f).replace(/'/g, "&#39;")})' class="flash-food-item">
            <img src="${imgSrc}" class="flash-img" onerror="this.src='https://placehold.co/300x200?text=Makanan'">
            <div class="p-2.5">
              <h4 class="text-white font-bold text-xs line-clamp-1">${f["Nama Makanan"]}</h4>
              <div class="flex justify-between items-center mt-1">
                <span class="text-cyan-300 font-bold text-xs">Rp${f.Harga || "-"}</span>
                <span class="badge-kategori text-blue-200 text-[9px]">${f.Kategori || "Kuliner"}</span>
              </div>
              <p class="text-gray-400 text-[10px] line-clamp-2 mt-1">${(f["Deskripsi Makanan"] || "Nikmati kelezatan").slice(0,60)}</p>
              <div class="mt-1 flex items-center text-[9px] text-blue-300"><i class="fas fa-location-dot mr-1"></i> ${f.distance ? f.distance.toFixed(1) : '?'} km</div>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    function tampilkanDetail(food) {
      const modal = document.getElementById("detailModal");
      const body = document.getElementById("modalDetailBody");
      modal.classList.remove("hidden");
      body.innerHTML = `
        <img src="${food["Link Gambar"] || 'https://placehold.co/400x200?text=Gourmet'}" class="w-full h-52 object-cover rounded-2xl mt-2 shadow-lg" onerror="this.src='https://placehold.co/400x200?text=Food'">
        <h3 class="text-white text-2xl font-bold mt-4">${food["Nama Makanan"]}</h3>
        <p class="text-blue-200 text-sm mt-2">${food["Deskripsi Makanan"] || "Nikmati cita rasa khas Nusantara"}</p>
        <div class="mt-4 space-y-2 bg-white/5 p-3 rounded-xl"><p class="text-white text-sm"><i class="fas fa-location-dot text-blue-400 w-5"></i> ${food.Alamat || "Alamat tersedia di Maps"}</p><p class="text-cyan-300 font-bold">💰 Rp${food.Harga || "—"}</p><p class="text-gray-300 text-sm"><i class="fas fa-tag"></i> ${food.Kategori || "Kuliner"}</p></div>
        <a href="${food["Lokasi Link Maps"] || "#"}" target="_blank" class="block mt-5 bg-blue-600 text-center p-3 rounded-xl text-white font-semibold flex gap-2 justify-center"><i class="fab fa-google"></i> Navigasi Google Maps</a>
      `;
    }
    function closeDetailModal() { document.getElementById("detailModal").classList.add("hidden"); }
    function openAiModal() { document.getElementById("aiMoodModal").classList.remove("hidden"); }
    function closeAiMoodModal() { document.getElementById("aiMoodModal").classList.add("hidden"); }

    function pilihMood(mood) {
      let filteredMood = [...masterFoods];
      if (mood === "sedih") filteredMood = masterFoods.filter(f => (f.Kategori || "").toLowerCase().includes("minuman") || (f.Kategori || "").toLowerCase().includes("mie"));
      else if (mood === "bahagia") filteredMood = masterFoods.filter(f => parseInt(f.Harga) > 10000);
      else if (mood === "nostalgia") filteredMood = masterFoods.filter(f => (f.Kategori || "").toLowerCase().includes("bakso"));
      else filteredMood = masterFoods;
      masterFoods = filteredMood;
      renderUIByMode();
      closeAiMoodModal();
      showToast("✨ Rekomendasi suasana hati diterapkan ✨");
    }

    document.getElementById("searchFoodInput")?.addEventListener("input", () => renderUIByMode());
    document.getElementById("categoryFilterSelect")?.addEventListener("change", () => renderUIByMode());
    document.getElementById("aiMoodBtn")?.addEventListener("click", openAiModal);
    
    const showAllBtn = document.getElementById("showAllFlashBtn");
    const closeFlashView = document.getElementById("closeFlashViewBtn");
    if (showAllBtn) showAllBtn.addEventListener("click", () => {
      isFlashMode = true;
      renderUIByMode();
      setTimeout(() => { document.querySelector(".main-scroll-area")?.scrollTo({ top: 0, behavior: 'smooth' }); }, 50);
    });
    if (closeFlashView) closeFlashView.addEventListener("click", () => {
      isFlashMode = false;
      renderUIByMode();
    });

    const logoutBtn = document.getElementById("logoutButton");
    if (logoutBtn) logoutBtn.addEventListener("click", logout);

    window.onload = () => {
      const savedName = localStorage.getItem("sae_user_nama");
      if (savedName && savedName !== "undefined" && savedName !== "") {
        currentUser.nama = savedName;
        pindahKeHome(savedName);
      } else {
        document.getElementById("authWrapper").classList.remove("hidden");
        document.getElementById("appHome").classList.add("hidden");
      }
    };
    window.closeDetailModal = closeDetailModal;
    window.tampilkanDetail = tampilkanDetail;
  </script>
</body>
</html>
